<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Turno - SaludPlus</title>
    <link rel="stylesheet" href="css/turnos.css">
</head>
<body>
    <main>
        <form>
            <!-- Sección 1: Datos del Paciente -->
            <fieldset>
                <legend>Datos del Paciente</legend>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre" required>
                <small class="mensaje-error"></small>

                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" placeholder="Ingrese su apellido" required>
                <small class="mensaje-error"></small>

                <label for="dni">DNI:</label>
                <input type="text" id="dni" name="dni" placeholder="Ingrese su DNI" required>
                <small class="mensaje-error"></small>

                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="Ingrese su correo" required>
                <small class="mensaje-error"></small>

                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Ingrese su teléfono" required>
                <small class="mensaje-error"></small>

                <label for="fecha-nacimiento">Fecha de Nacimiento:</label>
                <input type="date" id="fecha-nacimiento" name="fecha-nacimiento" required>
                <small class="mensaje-error"></small>
            </fieldset>

            <!-- Sección 2: Datos del Turno -->
            <fieldset>
                <legend>Datos del Turno</legend>
                <label for="especialidad">Especialidad:</label>
                <select id="especialidad" name="especialidad" required>
                    <option value="">Seleccione</option>
                    <option value="clinica-general">Clínica General</option>
                    <option value="cardiologia">Cardiología</option>
                    <option value="pediatria">Pediatría</option>
                    <option value="ginecologia">Ginecología</option>
                    <option value="traumatologia">Traumatología</option>
                    <option value="neurologia">Neurología</option>
                </select>
                <small class="mensaje-error"></small>

                <label for="medico">Médico:</label>
                <select id="medico" name="medico" disabled required>
                    <option value="">Seleccione una especialidad primero</option>
                </select>
                <small class="mensaje-error"></small>

                <label for="tipo-consulta">Tipo de Consulta:</label>
                <select id="tipo-consulta" name="tipo-consulta" required>
                    <option value="">Seleccione</option>
                    <option value="primera-consulta">Primera Consulta</option>
                    <option value="control">Control</option>
                    <option value="resultado-estudios">Resultado de Estudios</option>
                </select>
                <small class="mensaje-error"></small>

                <label for="fecha-turno">Fecha del Turno:</label>
                <input type="date" id="fecha-turno" name="fecha-turno" required>
                <small class="mensaje-error"></small>

                <label for="hora-turno">Hora del Turno:</label>
                <input type="time" id="hora-turno" name="hora-turno" required>
                <small class="mensaje-error"></small>

                <label for="modalidad">Modalidad:</label>
                <select id="modalidad" name="modalidad" required>
                    <option value="">Seleccione</option>
                    <option value="presencial">Presencial</option>
                    <option value="videoconsulta">Videoconsulta</option>
                </select>
                <small class="mensaje-error"></small>

                <div id="plataforma-container" style="display: none;">
                    <label for="plataforma">Plataforma Preferida:</label>
                    <select id="plataforma" name="plataforma">
                        <option value="">Seleccione</option>
                        <option value="zoom">Zoom</option>
                        <option value="google-meet">Google Meet</option>
                        <option value="teams">Teams</option>
                    </select>
                    <small class="mensaje-error"></small>
                </div>
            </fieldset>

            <!-- Botones -->
            <div class="form-buttons">
                <button type="submit">Solicitar Turno</button>
                <button type="reset">Limpiar Formulario</button>
            </div>
        </form>
    </main>
    <script src="js/validaciones.js"></script>
</body>
</html>
